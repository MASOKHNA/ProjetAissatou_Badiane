name: ahp_ia_flood
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.11

  # Core scientifique
  - numpy>=1.24
  - pandas>=2.0
  - matplotlib>=3.7
  - seaborn>=0.12
  - scikit-learn>=1.3

  # ML
  - xgboost>=1.7
  - lightgbm>=4.0

  # Geospatial (conda-forge gère les binaires macOS)
  - rasterio>=1.3
  - geopandas>=0.13
  - shapely>=2.0
  - folium>=0.14

  # Deep Learning
  - tensorflow>=2.13

  # Jupyter
  - jupyter
  - notebook
  - ipykernel

  # pip-only packages
  - pip
  - pip:
    - xgboost>=1.7.0
    - lightgbm>=4.0.0
